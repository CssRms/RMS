name: Database Backup

on:
  schedule:
    - cron: '0 2 * * *' # every day at 02:00 UTC
  workflow_dispatch: {} # allows manually triggering a backup from the Actions tab

jobs:
  # Primary copy: unencrypted dump in the same R2 bucket already used for file storage.
  backup-to-r2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install backup dependencies
        run: npm install @aws-sdk/client-s3@^3.886.0 --no-save

      - name: Install postgresql-client 18 (for pg_dump)
        # Ubuntu's default apt package only ships pg_dump 16, but Railway's Postgres
        # is on 18 - pg_dump refuses to dump a server newer than itself. Pull from
        # PostgreSQL's own apt repo (PGDG) instead, pinned to match the server.
        run: |
          sudo apt-get install -y wget gnupg lsb-release
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/postgresql.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-18
          # PGDG installs versioned binaries under /usr/lib/postgresql/18/bin/, not
          # into /usr/bin - prepend it so this pg_dump 18 is found before the
          # pre-existing pg_dump 16 that ships on the runner image by default.
          echo "/usr/lib/postgresql/18/bin" >> "$GITHUB_PATH"

      - name: Run backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: node scripts/backup-db.js

  # Second, independent copy: AES-256 encrypted, uploaded to the super admin's Google
  # Drive instead of Cloudflare - so losing access to Cloudflare doesn't also mean
  # losing the only off-Railway backup. Runs regardless of whether the R2 job succeeds.
  backup-to-drive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install postgresql-client 18 (for pg_dump)
        # No npm dependencies needed here - backup-db-to-drive.js talks to Google's
        # APIs via the plain https module, not the googleapis package.
        run: |
          sudo apt-get install -y wget gnupg lsb-release
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/postgresql.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-18
          echo "/usr/lib/postgresql/18/bin" >> "$GITHUB_PATH"

      - name: Run encrypted backup to Drive
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BACKUP_ENCRYPTION_KEY: ${{ secrets.BACKUP_ENCRYPTION_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: node scripts/backup-db-to-drive.js
