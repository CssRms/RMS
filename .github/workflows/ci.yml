name: CI

# ─────────────────────────────────────────────────────────────────────────────
#  Railway handles deployment automatically via its GitHub integration:
#  • dev branch  → Railway staging service (when staging is set up)
#  • main branch → Railway production service (auto-deploys on push)
#
#  This workflow is purely a quality gate — it must pass before a PR can merge
#  into main (enforced by branch protection), ensuring broken code never reaches
#  production. Railway is configured with "Wait for CI" so it only deploys after
#  this workflow succeeds.
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Backend ──────────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install backend dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema=rms_backend/prisma/schema.prisma

      - name: Backend syntax check
        run: node --check serve.js

      - name: Run backend tests
        run: npm test -- --passWithNoTests

      # ── Frontend ─────────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: rms_frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: rms_frontend
        run: npm ci --legacy-peer-deps

      - name: Run frontend tests
        working-directory: rms_frontend
        run: npm test -- --passWithNoTests

      - name: Build frontend
        working-directory: rms_frontend
        run: npm run build
        env:
          VITE_TURNSTILE_SITE_KEY: ''
